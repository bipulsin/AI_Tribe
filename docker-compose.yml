name: ai_tribe

services:
  db:
    image: postgres:17-alpine
    container_name: ai_tribe_db
    environment:
      POSTGRES_USER: ai_tribe
      POSTGRES_PASSWORD: ai_tribe
      POSTGRES_DB: ai_tribe
    ports:
      - "5432:5432"
    volumes:
      - ai_tribe_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_tribe -d ai_tribe"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Default app: ML_MODE=stub, no torch/transformers in the image.
  app:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/arm64
    container_name: ai_tribe_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      DEBUG: "false"
      ML_MODE: stub
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-a-long-random-string}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DATABASE_URL: postgresql+psycopg://ai_tribe:ai_tribe@db:5432/ai_tribe
      UPLOAD_DIR: /app/data/uploads
      LLM_ENCRYPTION_KEY: ${LLM_ENCRYPTION_KEY:-}
      HOST: 0.0.0.0
      PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ai_tribe_uploads:/app/data/uploads
    restart: unless-stopped

  # Live-model app: only started with `--profile ml` (paperclip-vm path).
  # Resource-capped so it cannot starve co-located services.
  app_ml:
    profiles: ["ml"]
    build:
      context: .
      dockerfile: Dockerfile.ml
      platforms:
        - linux/arm64
    container_name: ai_tribe_app_ml
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      DEBUG: "false"
      ML_MODE: live
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-a-long-random-string}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DATABASE_URL: postgresql+psycopg://ai_tribe:ai_tribe@db:5432/ai_tribe
      UPLOAD_DIR: /app/data/uploads
      LLM_ENCRYPTION_KEY: ${LLM_ENCRYPTION_KEY:-}
      HF_HOME: /app/backend/app/ml_weights/huggingface
      TORCH_HOME: /app/backend/app/ml_weights/torch
      HOST: 0.0.0.0
      PORT: 8000
    # Local profile smoke-test port; paperclip-vm routes via Caddy on the Docker network.
    ports:
      - "8001:8000"
    volumes:
      - ai_tribe_uploads:/app/data/uploads
      - ai_tribe_ml_weights:/app/backend/app/ml_weights
    mem_limit: 2g
    cpus: 2.0
    restart: unless-stopped

volumes:
  ai_tribe_pgdata:
  ai_tribe_uploads:
  ai_tribe_ml_weights:
