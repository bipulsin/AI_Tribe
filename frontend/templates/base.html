<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>{% block title %}AI Tribe{% endblock %} · Motor Damage Assessment</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            navy: '#001F3F',
            gold: '#B8860B',
            canvas: '#F7F8FA',
            ink: '#0A0F1A',
            mist: '#E8ECF1',
          },
        },
      },
    };
  </script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/static/css/app.css" />
  {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}min-h-screen bg-canvas text-navy antialiased dark:bg-ink dark:text-mist{% endblock %}">
  {% block body %}{% endblock %}
  {% include "partials/help_trigger.html" %}
  {% include "partials/attribution.html" %}
  {% include "partials/help_guide.html" %}
  {% include "partials/media_preview_modal.html" %}
  <script src="/static/js/help_guide.js"></script>
  <script src="/static/js/media_preview.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
