<div
  id="profile-panel"
  class="chrome-modal"
  x-show="profileOpen"
  x-cloak
  @keydown.escape.window="closeProfile()"
>
  <div class="chrome-modal-backdrop" @click="closeProfile()"></div>
  <div class="chrome-modal-panel chrome-modal-panel--wide" role="dialog" aria-labelledby="profile-panel-title">
    <header class="chrome-modal-header">
      <h2 id="profile-panel-title" class="chrome-modal-title">Profile</h2>
      <button type="button" class="chrome-modal-close" @click="closeProfile()" aria-label="Close profile">&times;</button>
    </header>
    <div class="chrome-modal-body space-y-6">
      <section>
        <p class="chrome-field-label">Profile photo</p>
        <div class="mt-2 flex items-center gap-4">
          <div class="profile-panel-avatar-wrap">
            <img x-show="profile.photo_url" :src="profile.photo_url" alt="" class="profile-panel-avatar" x-cloak />
            <span x-show="!profile.photo_url" class="profile-panel-initial" x-text="initials"></span>
          </div>
          <div class="flex flex-wrap gap-2">
            <label class="btn-primary cursor-pointer rounded-lg px-3 py-1.5 text-xs font-semibold">
              Upload
              <input type="file" accept="image/jpeg,image/png,image/webp" class="sr-only" @change="uploadPhoto($event)" />
            </label>
            <button
              type="button"
              class="rounded-lg border border-white/15 px-3 py-1.5 text-xs font-medium text-mist/80"
              x-show="profile.has_photo"
              @click="removePhoto()"
              x-cloak
            >
              Remove
            </button>
          </div>
        </div>
        <p class="mt-1 text-xs text-mist/45">JPEG, PNG, or WebP · max 2 MB · stored on disk only</p>
        <p class="mt-1 text-xs text-amber-300/80" x-show="photoMessage" x-text="photoMessage" x-cloak></p>
      </section>

      <section>
        <label for="profile_full_name" class="chrome-field-label">Full name</label>
        <div class="mt-1 flex gap-2">
          <input
            id="profile_full_name"
            type="text"
            x-model="profile.full_name"
            class="chrome-input flex-1"
            maxlength="128"
          />
          <button type="button" class="btn-primary rounded-lg px-3 py-2 text-xs font-semibold" @click="saveFullName()">Save</button>
        </div>
        <p class="mt-1 text-xs text-amber-300/80" x-show="nameMessage" x-text="nameMessage" x-cloak></p>
      </section>

      <section>
        <label for="profile_dob" class="chrome-field-label">Date of birth</label>
        <div class="mt-1 flex gap-2">
          <input id="profile_dob" type="date" x-model="profile.date_of_birth" class="chrome-input flex-1" />
          <button type="button" class="btn-primary rounded-lg px-3 py-2 text-xs font-semibold" @click="saveDob()">Save</button>
        </div>
        <p class="mt-1 text-xs text-amber-300/80" x-show="dobMessage" x-text="dobMessage" x-cloak></p>
      </section>

      <section class="border-t border-white/10 pt-4">
        <p class="chrome-field-label">Change password</p>
        <div class="mt-2 space-y-2">
          <input
            type="password"
            x-model="passwordCurrent"
            placeholder="Current password"
            class="chrome-input w-full"
            autocomplete="current-password"
          />
          <input
            type="password"
            x-model="passwordNew"
            placeholder="New password (min 8 characters)"
            class="chrome-input w-full"
            autocomplete="new-password"
          />
          <button type="button" class="btn-primary rounded-lg px-3 py-2 text-xs font-semibold" @click="savePassword()">
            Update password
          </button>
        </div>
        <p class="mt-1 text-xs text-amber-300/80" x-show="passwordMessage" x-text="passwordMessage" x-cloak></p>
      </section>
    </div>
  </div>
</div>
