<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in · AI Tribe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: '#001F3F',
            gold: '#B8860B',
            canvas: '#F7F8FA',
          },
        },
      },
    };
  </script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body class="min-h-screen overflow-hidden text-white antialiased">
  <div class="login-stage relative flex min-h-screen items-center justify-center px-4">
    <video
      id="login-bg-video"
      class="login-bg-video absolute inset-0 h-full w-full object-cover"
      autoplay
      muted
      loop
      playsinline
      poster=""
    >
      <source src="/static/video/login_bg.mp4" type="video/mp4" />
    </video>
    <div class="login-overlay absolute inset-0" aria-hidden="true"></div>

    <main class="relative z-10 w-full max-w-md">
      <div class="glass-card rounded-2xl px-8 py-10 text-white">
        <div class="mb-8 text-center">
          <p class="text-xs font-semibold uppercase tracking-[0.28em] text-gold">AI Lab</p>
          <h1 class="mt-3 text-3xl font-semibold tracking-tight">AI Tribe</h1>
          <p class="mt-2 text-sm text-white/75">Motor Damage Assessment</p>
        </div>

        <form
          id="login-form"
          hx-post="/auth/login"
          hx-target="#login-error"
          hx-swap="innerHTML"
          hx-disabled-elt="find button[type=submit]"
          hx-indicator="#login-spinner"
          class="space-y-5"
          autocomplete="on"
        >
          <div>
            <label for="username" class="mb-1.5 block text-sm font-medium text-white/90">Username</label>
            <input
              id="username"
              name="username"
              type="text"
              required
              autofocus
              autocomplete="username"
              class="w-full rounded-lg border border-white/20 bg-white/10 px-3.5 py-2.5 text-white placeholder-white/40 outline-none ring-gold/40 transition focus:border-gold/60 focus:bg-white/15 focus:ring-2"
              placeholder="admin"
            />
          </div>

          <div>
            <label for="password" class="mb-1.5 block text-sm font-medium text-white/90">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              required
              autocomplete="current-password"
              class="w-full rounded-lg border border-white/20 bg-white/10 px-3.5 py-2.5 text-white placeholder-white/40 outline-none ring-gold/40 transition focus:border-gold/60 focus:bg-white/15 focus:ring-2"
              placeholder="••••••••"
            />
          </div>

          <div id="login-error" class="min-h-[1.25rem]" aria-live="polite">
            {% if error %}
              {% include "partials/login_error.html" %}
            {% endif %}
          </div>

          <button
            type="submit"
            class="btn-primary inline-flex w-full items-center justify-center rounded-lg px-4 py-2.5 text-sm font-semibold tracking-wide shadow-lg shadow-black/20"
          >
            <span id="login-spinner" class="btn-spinner htmx-indicator"></span>
            Sign in
          </button>
        </form>

        <p class="mt-8 text-center text-xs leading-relaxed text-white/55">
          Lab prototype for demonstration only. Not a production insurer deployment.
        </p>
      </div>
    </main>
  </div>

  <script src="/static/js/video_bg.js"></script>
</body>
</html>
